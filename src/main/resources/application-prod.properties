spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.backfill.enabled=false
app.backfill.accounting.enabled=false
app.backfill.audit-log-migration.enabled=false
app.backfill.payroll-repair.enabled=false
app.startup-runners.account-validation.enabled=false
