spring.application.name=tiretrack
spring.config.import=optional:file:.env[.properties]

spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tiretrack}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.backfill.enabled=${APP_BACKFILL_ENABLED:false}
app.backfill.accounting.enabled=${APP_ACCOUNTING_BACKFILL_ENABLED:false}
app.backfill.audit-log-migration.enabled=${APP_AUDIT_LOG_MIGRATION_ENABLED:false}
app.backfill.payroll-repair.enabled=${APP_PAYROLL_REPAIR_ENABLED:false}
app.startup-runners.account-validation.enabled=${APP_ACCOUNT_VALIDATION_ENABLED:false}
refresh.token.expiration=604800000

tiretrack.platform-owner.bootstrap-enabled=${PLATFORM_OWNER_BOOTSTRAP_ENABLED:true}
tiretrack.platform-owner.email=${PLATFORM_OWNER_EMAIL:fouad99877@gmail.com}
tiretrack.platform-owner.full-name=${PLATFORM_OWNER_NAME:Fouad Shalaby}
tiretrack.platform-owner.phone=${PLATFORM_OWNER_PHONE:000-000-0000}
tiretrack.platform-owner.password=${PLATFORM_OWNER_PASSWORD:}
tiretrack.platform-owner.reset-password=${PLATFORM_OWNER_RESET_PASSWORD:false}
