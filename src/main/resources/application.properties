spring.application.name=tiretrack

spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tiretrack}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.backfill.enabled=${APP_BACKFILL_ENABLED:false}
app.backfill.accounting.enabled=${APP_ACCOUNTING_BACKFILL_ENABLED:false}
app.backfill.audit-log-migration.enabled=${APP_AUDIT_LOG_MIGRATION_ENABLED:false}
app.backfill.payroll-repair.enabled=${APP_PAYROLL_REPAIR_ENABLED:false}
app.startup-runners.account-validation.enabled=${APP_ACCOUNT_VALIDATION_ENABLED:false}
refresh.token.expiration=604800000
